<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiMED | Acceso</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark: #1A3D2A;
      --green:      #00706A;
      --gold:       #D4A020;
      --danger:     #9B2335;
      --text:       #1A1A1A;
      --muted:      #5A6A64;
      --border:     #d0ddd9;
    }

    body {
      font-family: 'Noto Sans', sans-serif;
      min-height: 100vh;
      display: flex;
    }

    /* ── PANEL IZQUIERDO ── */
    .left-panel {
      width: 46%;
      background: var(--green-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
    }

    .left-panel::before {
      content: '';
      position: absolute;
      width: 420px; height: 420px;
      border-radius: 50%;
      border: 60px solid rgba(255,255,255,.04);
      bottom: -120px; right: -120px;
    }
    .left-panel::after {
      content: '';
      position: absolute;
      width: 260px; height: 260px;
      border-radius: 50%;
      border: 40px solid rgba(255,255,255,.04);
      top: -80px; left: -60px;
    }

    .brand { text-align: center; position: relative; z-index: 1; }

    /* SVG logo engrane-grafica */
    .ciae-logo {
      width: 110px; height: 110px;
      margin-bottom: 20px;
    }

    .brand-name {
      font-size: 52px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .brand-name span { color: var(--gold); }

    .brand-sub {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      color: rgba(255,255,255,.55);
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .brand-divider {
      width: 40px; height: 2px;
      background: var(--gold);
      margin: 0 auto 28px;
    }

    .brand-desc {
      font-size: 13.5px;
      color: rgba(255,255,255,.7);
      line-height: 1.7;
      text-align: center;
      max-width: 300px;
    }

    .brand-footer {
      position: absolute;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,.3);
      letter-spacing: .5px;
    }

    /* ── PANEL DERECHO ── */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 56px;
      background: #fff;
    }

    .form-wrap { width: 100%; max-width: 380px; }

    .form-heading {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color .2s, box-shadow .2s;
      background: #fafafa;
    }
    .field input:focus {
      outline: none;
      border-color: var(--green);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(0,112,106,.1);
    }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--green-dark);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s, transform .1s;
      letter-spacing: .3px;
    }
    .btn-submit:hover  { background: var(--green); }
    .btn-submit:active { transform: scale(.99); }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

    .error-msg {
      color: var(--danger);
      font-size: 13px;
      margin-top: 14px;
      min-height: 20px;
      text-align: center;
    }

    .right-footer {
      margin-top: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #aaa;
    }
    .right-footer svg { opacity: .5; }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      body { flex-direction: column; }
      .left-panel {
        width: 100%;
        padding: 40px 24px 36px;
      }
      .brand-name { font-size: 40px; }
      .right-panel { padding: 36px 24px; }
      .brand-footer { display: none; }
    }
  </style>
</head>
<body>

<!-- PANEL IZQUIERDO -->
<div class="left-panel">
  <div class="brand">
    <!-- Logo CIAE México Poniente -->
    <svg class="ciae-logo" viewBox="0 0 120 130" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="gearGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#1A4A5C"/>
          <stop offset="100%" stop-color="#00B4A0"/>
        </linearGradient>
        <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#1A4A5C"/>
          <stop offset="100%" stop-color="#00C4B0"/>
        </linearGradient>
        <clipPath id="circleClip">
          <circle cx="60" cy="58" r="34"/>
        </clipPath>
      </defs>

      <!-- Dientes del engrane (12 dientes) -->
      <g fill="url(#gearGrad)">
        <rect x="56" y="4"  width="8" height="13" rx="2.5" transform="rotate(0 60 58)"/>
        <rect x="56" y="4"  width="8" height="13" rx="2.5" transform="rotate(30 60 58)"/>
        <rect x="56" y="4"  width="8" height="13" rx="2.5" transform="rotate(60 60 58)"/>
        <rect x="56" y="4"  width="8" height="13" rx="2.5" transform="rotate(90 60 58)"/>
        <rect x="56" y="4"  width="8" height="13" rx="2.5" transform="rotate(120 60 58)"/>
        <rect x="56" y="4"  width="8" height="13" rx="2.5" transform="rotate(150 60 58)"/>
        <rect x="56" y="4"  width="8" height="13" rx="2.5" transform="rotate(180 60 58)"/>
        <rect x="56" y="4"  width="8" height="13" rx="2.5" transform="rotate(210 60 58)"/>
        <rect x="56" y="4"  width="8" height="13" rx="2.5" transform="rotate(240 60 58)"/>
        <rect x="56" y="4"  width="8" height="13" rx="2.5" transform="rotate(270 60 58)"/>
        <rect x="56" y="4"  width="8" height="13" rx="2.5" transform="rotate(300 60 58)"/>
        <rect x="56" y="4"  width="8" height="13" rx="2.5" transform="rotate(330 60 58)"/>
      </g>

      <!-- Anillo del engrane -->
      <circle cx="60" cy="58" r="42" fill="none" stroke="url(#gearGrad)" stroke-width="8"/>
      <circle cx="60" cy="58" r="34" fill="none" stroke="url(#gearGrad)" stroke-width="1"/>

      <!-- Barras internas (clipeadas al círculo) -->
      <g clip-path="url(#circleClip)" fill="url(#barGrad)">
        <rect x="25" y="60" width="9" height="32" rx="1.5"/>
        <rect x="37" y="52" width="9" height="40" rx="1.5"/>
        <rect x="49" y="44" width="9" height="48" rx="1.5"/>
        <rect x="61" y="38" width="9" height="54" rx="1.5"/>
        <rect x="73" y="46" width="9" height="46" rx="1.5"/>
        <rect x="85" y="42" width="9" height="50" rx="1.5"/>
      </g>

      <!-- Línea de tendencia -->
      <polyline points="29,60 42,50 53,42 65,36 77,44 90,40"
        stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"
        clip-path="url(#circleClip)"/>
      <!-- Puntos en la línea -->
      <g fill="white" clip-path="url(#circleClip)">
        <circle cx="29" cy="60" r="3"/>
        <circle cx="42" cy="50" r="3"/>
        <circle cx="53" cy="42" r="3"/>
        <circle cx="65" cy="36" r="3"/>
        <circle cx="77" cy="44" r="3"/>
        <circle cx="90" cy="40" r="3"/>
      </g>

      <!-- Texto CIAE debajo -->
      <text x="60" y="116" text-anchor="middle" font-family="Noto Sans, sans-serif"
            font-weight="300" font-size="13" letter-spacing="5" fill="rgba(255,255,255,.7)">CIAE</text>
      <text x="60" y="128" text-anchor="middle" font-family="Noto Sans, sans-serif"
            font-weight="300" font-size="8" letter-spacing="3" fill="rgba(255,255,255,.45)">MÉXICO PONIENTE</text>
    </svg>

    <div class="brand-name">Si<span>MED</span></div>
    <div class="brand-sub">Sistema de Monitoreo de Egresos</div>
    <div class="brand-divider"></div>
    <div class="brand-desc">
      Plataforma de análisis y seguimiento de egresos hospitalarios para la <strong style="color:rgba(255,255,255,.9)">CIAE México Poniente · IMSS</strong>
    </div>
  </div>
  <div class="brand-footer">IMSS · OOAD México Poniente · v2.0</div>
</div>

<!-- PANEL DERECHO -->
<div class="right-panel">
  <div class="form-wrap">
    <div class="form-heading">Iniciar sesión</div>
    <div class="form-sub">Acceso exclusivo para personal autorizado de la CIAE</div>

    <form id="form-login">
      <div class="field">
        <label for="usuario">Usuario</label>
        <input id="usuario" type="text" autocomplete="username" placeholder="usuario" required>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-submit" id="btn-login">Entrar al sistema →</button>
    </form>
    <div class="error-msg" id="error-msg"></div>

    <div class="right-footer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
      </svg>
      IMSS · CIAE Méx. Poniente &nbsp;·&nbsp; <strong style="color:#888">v2.0</strong>
    </div>
  </div>
</div>

<script>
  if (sessionStorage.getItem('simed_user')) location.href = '/dashboard.html';

  document.getElementById('form-login').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const err = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = 'Verificando...';
    err.textContent = '';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          usuario:  document.getElementById('usuario').value.trim(),
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error de acceso');
      sessionStorage.setItem('simed_user', JSON.stringify(data));
      location.href = '/dashboard.html';
    } catch(ex) {
      err.textContent = ex.message;
      btn.disabled = false;
      btn.textContent = 'Entrar al sistema →';
    }
  });
</script>
</body>
</html>
