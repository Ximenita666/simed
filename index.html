<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMED | Acceso</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap');
    :root {
      --bg: #f2f5f4; --surface: #fff; --border: #b0cec6;
      --accent: #00706A; --accent2: #1A3D2A; --danger: #9B2335;
      --text: #1A1A1A; --muted: #5A6A64;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans', sans-serif; background: var(--bg);
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; }
    .card {
      background: var(--surface); border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 40px 36px;
      width: 100%; max-width: 360px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo img { height: 48px; }
    .logo h1 { font-size: 22px; font-weight: 700; color: var(--accent2); margin-top: 8px; }
    .logo p  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    label { display: block; font-size: 12px; font-weight: 600;
            color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }
    input {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: 7px; font-size: 14px; font-family: inherit;
      transition: border-color .2s;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .field { margin-bottom: 16px; }
    button {
      width: 100%; padding: 11px; background: var(--accent); color: #fff;
      border: none; border-radius: 7px; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: background .2s;
    }
    button:hover { background: var(--accent2); }
    button:disabled { background: var(--border); cursor: not-allowed; }
    .error { color: var(--danger); font-size: 13px; margin-top: 12px;
             text-align: center; min-height: 20px; }
    .imss-bar { height: 4px; background: linear-gradient(90deg,#00706A,#1A3D2A);
                border-radius: 12px 12px 0 0; margin: -40px -36px 32px; }
  </style>
</head>
<body>
<div class="card">
  <div class="imss-bar"></div>
  <div class="logo">
    <h1>SIMED</h1>
    <p>CIAE México Poniente · IMSS</p>
  </div>
  <form id="form-login">
    <div class="field">
      <label for="usuario">Usuario</label>
      <input id="usuario" type="text" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input id="password" type="password" autocomplete="current-password" required>
    </div>
    <button type="submit" id="btn-login">Ingresar</button>
  </form>
  <div class="error" id="error-msg"></div>
</div>

<script>
  // Si ya hay sesión activa, ir directo al dashboard
  if (sessionStorage.getItem('simed_user')) {
    location.href = '/dashboard.html';
  }

  document.getElementById('form-login').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const err = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = 'Verificando...';
    err.textContent = '';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          usuario:  document.getElementById('usuario').value.trim(),
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error de acceso');

      sessionStorage.setItem('simed_user', JSON.stringify(data));
      location.href = '/dashboard.html';
    } catch(ex) {
      err.textContent = ex.message;
      btn.disabled = false;
      btn.textContent = 'Ingresar';
    }
  });
</script>
</body>
</html>
