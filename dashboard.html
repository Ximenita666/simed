    // ============================================================
    //  PDF IMPRIMIBLE - REPORTE DE OCUPACION
    // ============================================================
    function openOcupacionPDF() {
      if (!state.egresos) return;
      const d = window._reporteData;

      // Capturar graficas del canvas actual
      const getImg = id => { const c = document.getElementById(id); return c ? c.toDataURL('image/png') : null; };
      const imgOcup = getImg('chart-ocup-bar');
      const imgEgr = getImg('chart-egr-bar');
      const imgTrend = getImg('chart-trend-line');

      const recs = state.egresos;
      const unidades = UNIDADES; // siempre los 6 hospitales, con o sin datos

      const fechasDates = recs.map(r => r.fecha instanceof Date ? r.fecha : new Date(r.fecha))
        .filter(d => !isNaN(d.getTime())).sort((a, b) => a - b);
      const periodoStr = fechasDates.length
        ? `Del ${fmtDate(fechasDates[0])} al ${fmtDate(fechasDates[fechasDates.length - 1])}` : '';

      const allPcts = recs.map(r => r.pct).filter(p => p !== null && p >= 0);
      const avgOcup = allPcts.length ? (allPcts.reduce((a, b) => a + b, 0) / allPcts.length).toFixed(1) : '-';
      const totalEgr = recs.reduce((a, r) => a + (r.egresos ?? 0), 0);
      const totalPre = recs.reduce((a, r) => a + (r.prealtas ?? 0), 0);

      const resumen = (d && d.resumen) || unidades.map(u => {
        const uR = recs.filter(r => r.unidad === u);
        const p = uR.map(r => r.pct).filter(p => p !== null && p >= 0);
        return {
          unidad: u, avgPct: p.length ? p.reduce((a, b) => a + b, 0) / p.length : null,
          maxPct: p.length ? Math.max(...p) : null,
          totalEgr: uR.reduce((a, r) => a + (r.egresos ?? 0), 0),
          totalPre: uR.reduce((a, r) => a + (r.prealtas ?? 0), 0),
          censables: uR.reduce((a, r) => Math.max(a, r.censables ?? 0), 0) || null
        };
      });

      // HOSP 05 MMIM 2025: Esperado 80-90% | Medio 70-79.9% | Bajo <70% o >90%
      const smBg = v => (v < 70 || v > 90) ? '#FDEDEC' : v >= 80 ? '#EAFAF1' : '#FEF9E7';
      const smTxt = v => (v < 70 || v > 90) ? '#7B241C' : v >= 80 ? '#1A7A40' : '#7D6608';
      const fN = v => (v !== null && v !== undefined) ? v : '-';
      const fP = v => (v !== null && v !== undefined) ? v.toFixed(1) + '%' : '-';

      // Seccion 3: Desglose por area (ultimo corte)
      const AREAS = [
        { n: 'Cirugia', c: 'cir_censables', o: 'cir_ocupadas', e: 'cir_egresos', p: 'cir_pct' },
        { n: 'Medicina', c: 'med_censables', o: 'med_ocupadas', e: 'med_egresos', p: 'med_pct' },
        { n: 'Urgencias', c: 'urg_censables', o: 'urg_ocupadas', e: 'urg_egresos', p: 'urg_pct' },
        { n: 'UCI Adultos', c: 'ucia_censables', o: 'ucia_ocupadas', e: 'ucia_egresos', p: 'ucia_pct' },
        { n: 'UCI Pediatricos', c: 'ucip_censables', o: 'ucip_ocupadas', e: 'ucip_egresos', p: 'ucip_pct' },
        { n: 'UCI Neonatal', c: 'ucin_censables', o: 'ucin_ocupadas', e: 'ucin_egresos', p: 'ucin_pct' },
        { n: 'Pediatricas Medicas', c: 'ped_censables', o: 'ped_ocupadas', e: 'ped_egresos', p: 'ped_pct' },
        { n: 'Ginecologia y Obstetricia', c: 'gin_censables', o: 'gin_ocupadas', e: 'gin_egresos', p: 'gin_pct' },
      ];
      const ultimoCorte = unidades.map(u => recs.filter(r => r.unidad === u).sort((a, b) => {

        const h = (r.hora || '').trim();
        if (h.startsWith('06')) byUnitDate[key].c06 = true;

      });

      const fechas = [...new Set(Object.values(byUnitDate).map(r => r.fecha))]
        .sort((a, b) => toS(a).localeCompare(toS(b)));

        });
      });

    function renderOcupReport() {
      const el = document.getElementById('ocupacion-content');
      if (!el || !state.egresos) { if (el) el.innerHTML = ''; return; }
      el.innerHTML = buildOcupReporteHTML();

    function buildOcupReporteHTML() {
      const recs = state.egresos;
      const unidades = UNIDADES; // siempre los 6 hospitales, con o sin datos

      // Periodo
      const fechasDates = recs
        .map(r => r.fecha instanceof Date ? r.fecha : new Date(r.fecha))
        .filter(d => !isNaN(d.getTime())).sort((a, b) => a - b);
      const periodoStr = fechasDates.length
        ? `Del ${fmtDate(fechasDates[0])} al ${fmtDate(fechasDates[fechasDates.length - 1])}`
        : '';

      // KPIs globales
      const allPcts = recs.map(r => r.pct).filter(p => p !== null && p >= 0);
      const avgOcup = allPcts.length ? (allPcts.reduce((a, b) => a + b, 0) / allPcts.length).toFixed(1) : '-';
      const totalEgresos = recs.reduce((a, r) => a + (r.egresos ?? 0), 0);
      const totalPrealtas = recs.reduce((a, r) => a + (r.prealtas ?? 0), 0);

      // Resumen por unidad
      const resumen = unidades.map(u => {
        const uRecs = recs.filter(r => r.unidad === u);
        const pcts = uRecs.map(r => r.pct).filter(p => p !== null && p >= 0);
        const avgPct = pcts.length ? pcts.reduce((a, b) => a + b, 0) / pcts.length : null;
        const maxPct = pcts.length ? Math.max(...pcts) : null;
        const totalEgr = uRecs.reduce((a, r) => a + (r.egresos ?? 0), 0);
        const totalPre = uRecs.reduce((a, r) => a + (r.prealtas ?? 0), 0);
        const censables = uRecs.reduce((a, r) => Math.max(a, r.censables ?? 0), 0) || null;
        const sem = avgPct === null ? 'n' : (avgPct < 70 || avgPct > 90) ? 'c' : avgPct >= 80 ? 'n' : 'a';
        return { unidad: u, avgPct, maxPct, totalEgr, totalPre, censables, sem };
      });

        return recs.filter(r => r.unidad === u).sort((a, b) => {

          if (db - da !== 0) return db - da;
          return (b.hora || '').localeCompare(a.hora || '');
        })[0];
      }).filter(Boolean);

      // Desglose por area (ultimo corte de cada unidad)
      const AREAS = [
        { nombre: 'Cirugia', c: 'cir_censables', o: 'cir_ocupadas', e: 'cir_egresos', p: 'cir_pct' },
        { nombre: 'Medicina', c: 'med_censables', o: 'med_ocupadas', e: 'med_egresos', p: 'med_pct' },
        { nombre: 'Urgencias', c: 'urg_censables', o: 'urg_ocupadas', e: 'urg_egresos', p: 'urg_pct' },

      // Alertas
      const fechaByUnitV = {};
      ultimoCorte.forEach(r => { fechaByUnitV[r.unidad] = fmtDate(r.fecha); });
      const seenA = new Set();
      const alertas = [];

        seenA.add(r.unidad + '|Global');

      desglose.filter(d => d.pct !== null && d.pct >= 100).forEach(d => {
        const k = d.unidad + '|' + d.area;
        if (!seenA.has(k)) { seenA.add(k); alertas.push({ unidad: d.unidad, area: d.area, pct: d.pct, fecha: fechaByUnitV[d.unidad] || '' }); }
      });
      alertas.sort((a, b) => b.pct - a.pct);

      // Tendencia diaria
      const byDate = {};

        const s = x => x ? x.split('/').reverse().join('') : '';

      });
      const trendVals = trendDates.map(d => {
        const v = byDate[d];
        return v.length ? +(v.reduce((a, b) => a + b, 0) / v.length).toFixed(1) : null;
      });

      // Listas unicas para filtros Seccion 3
      const areasUnicas = [...new Set(desglose.map(d => d.area))].sort();
      const unidadesDesc = [...new Set(desglose.map(d => d.unidad))].sort();

      window._reporteData = {

      <td style="font-family:'DM Mono',monospace;text-align:center;">${fN(r.totalEgr)}</td>

      h += `</tbody></table></div>`;

      // Seccion 2: Ultimo corte

      h += `<div class="table-wrap" style="margin-bottom:20px;"><table>

      ultimoCorte.forEach(r => {
        const s = r.pct === null ? 'n' : (r.pct < 70 || r.pct > 90) ? 'c' : r.pct >= 80 ? 'n' : 'a';
        h += `<tr>
      <td><strong>${r.unidad}</strong></td>

      <td style="font-family:'DM Mono',monospace;text-align:center;">${fN(r.censables)}</td>

      <td style="font-family:'DM Mono',monospace;text-align:center;">${fN(r.egresos)}</td>
      <td style="font-family:'DM Mono',monospace;text-align:center;">${fN(r.prealtas)}</td>
    </tr>`;
      });
      UNIDADES.filter(u => !unidadesConUltimo.has(u)).forEach(u => {
        h += `<tr style="opacity:0.55;">
      <td><strong>${u}</strong></td>
      <td colspan="7" style="text-align:center;color:var(--muted);font-style:italic;font-size:11px;">Sin datos en el archivo cargado — unidad no reporto en el periodo</td>
    </tr>`;
      });
      h += `</tbody></table></div>`;

      // Seccion 3: Desglose por area - con filtros
      h += subT('Seccion 3 - Desglose por Area de Hospitalizacion');
      h += `<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
    <span style="font-size:12px;color:var(--muted);">Filtrar por:</span>
    <select id="filtro-hospital" class="select-field" style="min-width:130px;font-size:12px;padding:4px 8px;" onchange="filterDesglose()">

    </select>
    <span id="filtro-count" style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;"></span>
  </div>`;

      h += `<div class="table-wrap" style="margin-bottom:20px;"><table id="tabla-desglose">
    <thead><tr><th>Unidad</th><th>Area</th><th>Censables</th><th>Ocupadas</th><th>% Ocup.</th><th>Egresos</th></tr></thead><tbody>`;
      desglose.forEach(d => {

      <td><strong>${d.unidad}</strong></td>

          h += `<div style="background:#FDEDEC;border-left:4px solid #9B2335;padding:10px 16px;border-radius:6px;font-size:12px;color:#7B241C;font-weight:600;">
        CRITICO: ${a.unidad} - ${a.area} al ${a.pct.toFixed(2)}% de ocupacion
      </div>`;

        h += `</div>`;

    function filterDesglose() {
      const hospital = (document.getElementById('filtro-hospital')?.value || '').toLowerCase();
      const area = (document.getElementById('filtro-area')?.value || '').toLowerCase();
      const rows = document.querySelectorAll('#tabla-desglose tbody tr');
      let visible = 0;
      rows.forEach(row => {
        const rU = (row.dataset.unidad || '').toLowerCase();
        const rA = (row.dataset.area || '').toLowerCase();
        const show = (!hospital || rU === hospital) && (!area || rA === area);
        row.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      const countEl = document.getElementById('filtro-count');
      if (countEl) countEl.textContent = `${visible} de ${rows.length} filas`;
    }

    // ============================================================
    //  INICIALIZAR GRAFICAS Chart.js (se llama despues de innerHTML)
    // ============================================================
    function renderOcupCharts() {
      const d = window._reporteData;
      if (!d || typeof Chart === 'undefined') return;

      // Destruir instancias previas
      if (window._ocupCharts) window._ocupCharts.forEach(c => { try { c.destroy(); } catch (e) { } });
      window._ocupCharts = [];

      const axT = { color: '#888780', font: { size: 11, family: 'Noto Sans' } };
      const grd = { color: 'rgba(136,135,128,0.15)' };

      // Orden mayor  menor ocupacion
      const byOcup = [...d.resumen].sort((a, b) => (b.avgPct || 0) - (a.avgPct || 0));
      const labOcup = byOcup.map(r => r.unidad);
      const valsOcup = byOcup.map(r => r.avgPct || 0);
      const colOcup = byOcup.map(r => d.COLORS[d.unidades.indexOf(r.unidad)] || '#888');

      const byEgr = [...d.resumen].sort((a, b) => b.totalEgr - a.totalEgr);
      const labEgr = byEgr.map(r => r.unidad);
      const valsEgr = byEgr.map(r => r.totalEgr);
      const colEgr = byEgr.map(r => d.COLORS[d.unidades.indexOf(r.unidad)] || '#888');

      // Chart 1 - barras horizontales ocupacion
      const c1 = document.getElementById('chart-ocup-bar');
      if (c1) window._ocupCharts.push(new Chart(c1, {
        type: 'bar',
        data: { labels: labOcup, datasets: [{ data: valsOcup, backgroundColor: colOcup, borderRadius: 4 }] },
        options: {
          indexAxis: 'y', responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.x.toFixed(1)}%` } } },
          scales: {
            x: { min: 40, max: 100, ticks: { ...axT, callback: v => v + '%' }, grid: grd },
            y: { ticks: axT, grid: { display: false } }
          }
        }
      }));

      // Chart 2 - barras verticales egresos
      const c2 = document.getElementById('chart-egr-bar');
      if (c2) window._ocupCharts.push(new Chart(c2, {
        type: 'bar',
        data: { labels: labEgr, datasets: [{ data: valsEgr, backgroundColor: colEgr, borderRadius: 4 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { ...axT, maxRotation: 30 }, grid: { display: false } },
            y: { ticks: axT, grid: grd }
          }
        }
      }));

      // Chart 3 - linea tendencia
      const c3 = document.getElementById('chart-trend-line');
      const validVals = d.trendVals.filter(v => v !== null);
      if (c3 && validVals.length) window._ocupCharts.push(new Chart(c3, {
        type: 'line',
        data: {
          labels: d.trendDates, datasets: [{
            data: d.trendVals, borderColor: '#378ADD',
            backgroundColor: 'rgba(55,138,221,0.08)',
            fill: true, tension: 0.35, pointRadius: 3,
            pointBackgroundColor: '#378ADD', borderWidth: 2,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y.toFixed(1)}%` } } },
          scales: {
            x: { ticks: { ...axT, autoSkip: false, maxRotation: 45 }, grid: grd },
            y: {
              min: Math.max(0, Math.min(...validVals) - 10), max: Math.min(110, Math.max(...validVals) + 10),
              ticks: { ...axT, callback: v => v + '%' }, grid: grd
            }
          }
        }
      }));
    }

    //  Descarga CSV SiMED 
    function downloadSimedCSV(unidad) {

      const records = unidad === 'TODAS'
        ? getFilteredRecords()
        : getFilteredRecords().filter(r => r.unidad === unidad);

      const rows = [['Unidad', 'Fecha', '06:00', '12:00', '18:00', 'Cumplimiento', 'Mes']];

        rows.push([r.unidad, fmtDate(r.fecha), r.c06 || '', r.c12 || '', r.c18 || '', r.cumpl || '', r.mes || '']);
      });
      const fname = unidad === 'TODAS' ? 'SiMED_General.csv' : `SiMED_${unidad.replace(' ', '_')}.csv`;
      triggerCSVDownload(rows, fname);
    }

    //  Descarga CSV Egresos 
    function downloadEgresosCSV(unidad) {
      if (!state.egresos) return;
      const records = unidad === 'TODAS'
        ? state.egresos
        : state.egresos.filter(r => r.unidad === unidad);

      const rows = [['Unidad', 'Fecha', 'Corte', 'Censables', 'Ocupadas', 'Egresos', 'PreAltas', '%Ocupacion',
        'Cir_Censables', 'Cir_Ocupadas', 'Cir_%', 'Med_Censables', 'Med_Ocupadas', 'Med_%',
        'Urg_Censables', 'Urg_Ocupadas', 'Urg_%', 'UCI_A_Censables', 'UCI_A_%',
        'UCI_P_%', 'UCI_N_%', 'Ped_Censables', 'Ped_%', 'Gin_Censables', 'Gin_%']];

      records.forEach(r => {
        rows.push([
          r.unidad, fmtDate(r.fecha), r.hora,
          r.censables ?? '', r.ocupadas ?? '', r.egresos ?? '', r.prealtas ?? '', r.pct ?? '',
          r.cir_censables ?? '', r.cir_ocupadas ?? '', r.cir_pct ?? '',
          r.med_censables ?? '', r.med_ocupadas ?? '', r.med_pct ?? '',
          r.urg_censables ?? '', r.urg_ocupadas ?? '', r.urg_pct ?? '',
          r.ucia_censables ?? '', r.ucia_pct ?? '',
          r.ucip_pct ?? '', r.ucin_pct ?? '',
          r.ped_censables ?? '', r.ped_pct ?? '',
          r.gin_censables ?? '', r.gin_pct ?? '',
        ]);
      });
      const fname = unidad === 'TODAS' ? 'Egresos_General.csv' : `Egresos_${unidad.replace(' ', '_')}.csv`;
      triggerCSVDownload(rows, fname);
    }

    //  Reporte de Cumplimiento de Reporte (quien reporto en los 3 horarios) 
    function downloadCumplimientoCSV(unidad) {
      if (!state.egresos) return;
      const records = unidad === 'TODAS'
        ? state.egresos
        : state.egresos.filter(r => r.unidad === unidad);

      // Agrupar por unidad + fecha  ver que cortes existen
      const byUnitDate = {};
      records.forEach(r => {
        const fechaKey = fmtDate(r.fecha);
        const key = r.unidad + '||' + fechaKey;
        if (!byUnitDate[key]) byUnitDate[key] = { unidad: r.unidad, fecha: fechaKey, cortes: new Set() };
        if (r.hora) byUnitDate[key].cortes.add(r.hora.trim());
      });

      const CORTES_ESPERADOS = ['06:00', '12:00', '18:00'];
      const rows = [['Unidad', 'Fecha', '06:00', '12:00', '18:00', 'Cortes Reportados', 'Cumplimiento']];

      // Ordenar por unidad asc, fecha asc
      Object.values(byUnitDate)
        .sort((a, b) => {
          if (a.unidad !== b.unidad) return a.unidad.localeCompare(b.unidad);
          // Sort by date: DD/MM/YYYY  comparable string YYYYMMDD
          const toSortable = s => s ? s.split('/').reverse().join('') : '';
          return toSortable(a.fecha).localeCompare(toSortable(b.fecha));
        })
        .forEach(item => {
          const has06 = CORTES_ESPERADOS.some(c => item.cortes.has(c) && (c === '06:00'));
          const has12 = CORTES_ESPERADOS.some(c => item.cortes.has(c) && (c === '12:00'));
          const has18 = CORTES_ESPERADOS.some(c => item.cortes.has(c) && (c === '18:00'));
          // Check by prefix too (some files may have 06:00:00 etc.)
          const check = h => [...item.cortes].some(c => c.startsWith(h));
          const c06 = check('06') ? 'Si' : 'No';
          const c12 = check('12') ? 'Si' : 'No';
          const c18 = check('18') ? 'Si' : 'No';
          const total = [c06, c12, c18].filter(v => v === 'Si').length;
          const cumpl = total === 3 ? 'Completo' : total > 0 ? 'Parcial' : 'Sin reporte';
          rows.push([item.unidad, item.fecha, c06, c12, c18, total + '/3', cumpl]);
        });

      const fname = unidad === 'TODAS'
        ? 'Cumplimiento_Reporte_General.csv'
        : `Cumplimiento_${unidad.replace(/\s/g, '_')}.csv`;
      triggerCSVDownload(rows, fname);
    }

    function triggerCSVDownload(rows, filename) {
      const csv = rows.map(r => r.map(v => `"${String(v ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function buildEgresosTable(records) {
      const sorted = [...records].sort((a, b) => {
        const da = a.fecha instanceof Date ? a.fecha : new Date(a.fecha || 0);
        const db = b.fecha instanceof Date ? b.fecha : new Date(b.fecha || 0);
        return db - da;
      });

      const fmtNum = v => v !== null ? v : '-';

      let html = `<div class="table-wrap"><table>
    <thead><tr>
      <th>Unidad</th><th>Fecha</th><th>Corte</th>
      <th>Censables</th><th>Ocupadas</th>
      <th>Egresos</th><th>Pre-Altas</th><th>% Ocupacion</th>
    </tr></thead><tbody>`;

      sorted.forEach(r => {
        const pctVal = r.pct !== null ? r.pct : null;
        const badge = pctVal === null ? 'badge-muted' : (pctVal < 70 || pctVal > 90) ? 'badge-danger' : pctVal >= 80 ? 'badge-ok' : 'badge-warn';
        const pctTxt = pctVal !== null ? pctVal.toFixed(1) + '%' : '-';
        html += `<tr>
      <td><strong>${r.unidad}</strong></td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;">${fmtDate(r.fecha)}</td>
      <td style="font-family:'DM Mono',monospace;">${r.hora}</td>
      <td style="font-family:'DM Mono',monospace;">${fmtNum(r.censables)}</td>
      <td style="font-family:'DM Mono',monospace;">${fmtNum(r.ocupadas)}</td>
      <td style="font-family:'DM Mono',monospace;">${fmtNum(r.egresos)}</td>
      <td style="font-family:'DM Mono',monospace;">${fmtNum(r.prealtas)}</td>
      <td><span class="badge ${badge}">${pctTxt}</span></td>
    </tr>`;
      });

      html += `</tbody></table></div>`;
      return html;
    }

            byUnit[r.unidad].push(r);
          });
          const dotTxt = v => {
            if (!v) return '-';
            const s = String(v).trim();
            if (s === '' || s === '' || s.toUpperCase() === 'TRUE' || s === '1') return '';
            if (s === '' || s === '' || s === 'X' || s.toUpperCase() === 'FALSE' || s === '0') return '';

          };
          Object.entries(byUnit).sort(([a], [b]) => a.localeCompare(b)).forEach(([unidad, recs]) => {

          { key: 'ucip', label: 'UCI Pediatricos' },
          { key: 'ucin', label: 'UCI Neonatal' },
          { key: 'ped', label: 'Pediatricas Medicas' },
          { key: 'gin', label: 'Ginecologia y Obstetricia' },
        ];
        unidades.forEach(unidad => {
          const uRecs = state.egresos.filter(r => r.unidad === unidad);
          const srt = [...uRecs].sort((a, b) => {
            const da = a.fecha instanceof Date ? a.fecha : new Date(a.fecha || 0);
            const db = b.fecha instanceof Date ? b.fecha : new Date(b.fecha || 0);
            return db - da;
          });
          if (!srt.length) {
            body += `<div style="border:1px dashed #ccc;border-radius:6px;padding:10px 14px;margin-bottom:10px;opacity:0.6;">
              <strong>${unidad}</strong> — <span style="color:#aaa;font-style:italic;">Sin datos en el archivo cargado</span>
            </div>`;
            return;
          }
          const lastStr = fmtDate(srt[0].fecha);
          const latest = srt.filter(r => fmtDate(r.fecha) === lastStr);

          const areaRows = AREAS.map(area => {
            const k = area.key;
            const cens = latest.map(r => r[`${k}_censables`]).find(v => v !== null) ?? null;
            const ocup = latest.map(r => r[`${k}_ocupadas`]).find(v => v !== null) ?? null;
            if (cens === null && ocup === null) return null;
            const pcts = latest.map(r => r[`${k}_pct`]).filter(v => v !== null);
            const avgPct = pcts.length ? pcts.reduce((a, b) => a + b, 0) / pcts.length : null;
            const egr = latest.reduce((s, r) => s + (r[`${k}_egresos`] ?? 0), 0);
            return { label: area.label, cens, ocup, egr, avgPct };
          }).filter(Boolean);

          if (!areaRows.length) return;
          body += `<div class="rpt-unit-block">
        <div class="rpt-unit-header" style="border-left:4px solid #2c3e50">
          ${unidad} <span style="font-size:11px;font-weight:400;color:#666;">(datos del ${lastStr})</span>
        </div>
        <table class="rpt-table" style="margin:0"><thead><tr>
          <th>Area</th><th>Censables</th><th>Ocupadas</th><th>Egresos</th><th>% Ocupacion</th>
        </tr></thead><tbody>`;
          areaRows.forEach(row => {
            const c = row.avgPct === null ? '#666' : ocupColor(row.avgPct);
            body += `<tr>
          <td><strong>${row.label}</strong></td>
          <td class="tc">${row.cens ?? '-'}</td>
          <td class="tc">${row.ocup ?? '-'}</td>
          <td class="tc">${row.egr || '-'}</td>
          <td class="tc" style="font-weight:700;color:${c}">${row.avgPct !== null ? row.avgPct.toFixed(1) + '%' : '-'}</td>
        </tr>`;
          });
          body += `</tbody></table></div>`;
        });
      }

      //  Construir HTML completo 
      const html = `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reporte ${mesLabel} - CIAE OOAD Mexico Poniente</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:12px;color:#1A3D2A;background:#fff;padding:28px 36px}
.rpt-header{display:flex;align-items:center;gap:18px;padding-bottom:16px;border-bottom:3px solid #1A3D2A;margin-bottom:24px}
.rpt-logo{background:#1A3D2A;color:#fff;font-weight:900;font-size:13px;padding:8px 12px;border-radius:6px;flex-shrink:0;letter-spacing:1px}
.rpt-main-title{font-size:19px;font-weight:800;color:#1A3D2A}
.rpt-sub-title{font-size:12px;color:#666;margin-top:3px}
.rpt-meta{margin-left:auto;text-align:right;font-size:11px;color:#555;line-height:1.8}
h2.rpt-section{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#1A3D2A;border-bottom:2px solid #ddd;padding-bottom:8px;margin:24px 0 14px}
h3.rpt-sub-section{font-size:12px;font-weight:700;color:#444;margin:20px 0 10px}
.rpt-kpi-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.rpt-kpi{background:#f7f8fa;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;min-width:120px}
.rpt-kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:#888;margin-bottom:4px}
.rpt-kpi-val{font-size:20px;font-weight:800;color:#1A3D2A}
.rpt-table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:11px}
.rpt-table th{background:#1A3D2A;color:#fff;font-size:9px;text-transform:uppercase;letter-spacing:.5px;padding:7px 9px;text-align:left;font-weight:600}
.rpt-table td{padding:6px 9px;border-bottom:1px solid #eee}
.rpt-table tbody tr:nth-child(even){background:#fafafa}
.rpt-unit-block{margin-bottom:14px;break-inside:avoid}
.rpt-unit-header{padding:7px 12px;background:#f0f2f5;font-size:12px;font-weight:700;color:#1A3D2A;margin-bottom:0}
.tc{text-align:center}
.mono{font-family:monospace;font-size:10px}
.ok{color:#1a7a5e}.warn{color:#a05c00}.danger{color:#a01020}
.rpt-page-break{page-break-before:always;margin-top:24px}
.rpt-footer{margin-top:36px;padding-top:12px;border-top:1px solid #ddd;font-size:10px;color:#aaa;text-align:center}
.print-btn{position:fixed;top:16px;right:16px;background:#1A3D2A;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;z-index:999}
.print-btn:hover{background:#2c3e50}
@media print{body{padding:0}.print-btn{display:none}.rpt-page-break{page-break-before:always}}
</style>
</head>
<body>
<button class="print-btn" onclick="window.print()">&#x1F5A8; Imprimir / PDF</button>
${body}
<div class="rpt-footer">Generado el ${today} | Coordinacion de Informacion y Analisis Estrategico (CIAE) | OOAD Mexico Poniente | IMSS</div>
</body>
</html>`;

      const win = window.open('', '_blank');
      if (!win) { alert('El navegador bloqueo la ventana emergente. Permite pop-ups para esta pagina.'); return; }
      win.document.write(html);
      win.document.close();
    }

    // ============================================================
    //  ANIMATIONS
    // ============================================================
    // ============================================================
    //  AUTH (sessionStorage)
    // ============================================================
    function getUser() {
      const raw = sessionStorage.getItem('simed_user');
      if (!raw) { location.href = '/'; return {}; }
      return JSON.parse(raw);
    }

    function initAuth() {
      const user = getUser();
      if (!user.id_user) return;
      // Mostrar nombre en navbar si existe el elemento
      const el = document.getElementById('nav-username');
      if (el) el.textContent = user.nameuser ?? '';
    }

    function logout() {
      sessionStorage.removeItem('simed_user');
      location.href = '/';
    }

    // Verificar sesión al cargar
    initAuth();

    // ============================================================
    function animateElements() {
      // Animate gauge fills on render
      setTimeout(() => {
        document.querySelectorAll('.gauge-ring .fill').forEach(el => {
          el.style.transition = 'stroke-dashoffset 1s ease';
        });
      }, 100);
    }

  </script>
</body>

</html>
